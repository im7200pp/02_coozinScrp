<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ItemScout Daily Rank Scraper</title>
    <!-- Modern Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-primary: #0b0f19;
            --bg-secondary: rgba(22, 28, 45, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-primary: #6366f1; /* Indigo */
            --accent-glow: rgba(99, 102, 241, 0.15);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --success: #10b981;
            --error: #ef4444;
            --terminal-bg: rgba(10, 12, 18, 0.95);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Abstract glowing background shapes */
        .glow-sphere-1 {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, rgba(99, 102, 241, 0) 70%);
            z-index: 0;
            pointer-events: none;
            filter: blur(80px);
        }

        .glow-sphere-2 {
            position: absolute;
            bottom: -10%;
            right: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.12) 0%, rgba(168, 85, 247, 0) 70%);
            z-index: 0;
            pointer-events: none;
            filter: blur(80px);
        }

        .container {
            width: 100%;
            max-width: 680px;
            padding: 20px;
            z-index: 1;
        }

        /* Glassmorphism Card */
        .card {
            background: var(--bg-secondary);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            box-shadow: 0 20px 60px rgba(99, 102, 241, 0.08);
        }

        /* Header design */
        header {
            margin-bottom: 35px;
            text-align: center;
        }

        .logo-area {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--accent-primary), #a855f7);
            border-radius: 16px;
            margin-bottom: 20px;
            box-shadow: 0 8px 24px var(--accent-glow);
        }

        .logo-area svg {
            width: 32px;
            height: 32px;
            fill: white;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            background: linear-gradient(135deg, #ffffff 60%, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        p.subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        /* Forms styling */
        .form-group {
            position: relative;
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: color 0.2s ease;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper svg {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            color: var(--text-muted);
            pointer-events: none;
            transition: color 0.2s ease;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            background-color: rgba(10, 12, 18, 0.4);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-family: inherit;
            font-size: 0.95rem;
            color: var(--text-main);
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
        }

        .form-input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 4px var(--accent-glow);
            background-color: rgba(10, 12, 18, 0.6);
        }

        .form-input:focus + svg {
            color: var(--accent-primary);
        }

        /* Premium Buttons */
        .btn-submit {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--accent-primary) 0%, #4f46e5 100%);
            border: none;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
            transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-submit:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.35);
            filter: brightness(1.1);
        }

        .btn-submit:active {
            transform: translateY(1px);
            box-shadow: 0 2px 6px rgba(99, 102, 241, 0.2);
        }

        .btn-submit:disabled {
            background: #27272a;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            color: var(--text-muted);
            filter: none;
        }

        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Console Terminal UI */
        .console-container {
            margin-top: 30px;
            display: none;
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .console-header {
            background-color: rgba(20, 24, 38, 0.95);
            border: 1px solid var(--border-color);
            border-bottom: none;
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .console-dots {
            display: flex;
            gap: 6px;
        }

        .console-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .console-dot.red { background-color: var(--error); }
        .console-dot.yellow { background-color: #eab308; }
        .console-dot.green { background-color: var(--success); }

        .console-title {
            font-size: 0.75rem;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-muted);
            font-weight: 500;
        }

        .console-terminal {
            background-color: var(--terminal-bg);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
            padding: 16px;
            height: 240px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            line-height: 1.6;
            color: #d1d5db;
        }

        /* Scrollbar styles */
        .console-terminal::-webkit-scrollbar {
            width: 6px;
        }
        .console-terminal::-webkit-scrollbar-track {
            background: transparent;
        }
        .console-terminal::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }
        .console-terminal::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .log-entry {
            margin-bottom: 6px;
            opacity: 0;
            transform: translateY(4px);
            animation: logFadeIn 0.2s ease forwards;
            display: flex;
            gap: 10px;
        }

        .log-time {
            color: #4f46e5;
            flex-shrink: 0;
        }

        .log-msg {
            word-break: break-all;
        }

        .log-msg.error {
            color: var(--error);
        }

        .log-msg.success {
            color: var(--success);
        }

        @keyframes logFadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Action block */
        .action-container {
            margin-top: 24px;
            text-align: center;
            display: none;
            animation: fadeIn 0.4s ease forwards;
        }

        .success-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: var(--success);
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 16px;
        }

        .btn-download {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 28px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border: none;
            border-radius: 12px;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-download:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(16, 185, 129, 0.35);
        }

        .btn-download svg {
            margin-right: 8px;
            width: 20px;
            height: 20px;
            fill: white;
        }

        /* Footer */
        footer {
            margin-top: 30px;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        footer a {
            color: var(--accent-primary);
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="glow-sphere-1"></div>
    <div class="glow-sphere-2"></div>

    <div class="container">
        <div class="card">
            <header>
                <div class="logo-area">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                    </svg>
                </div>
                <h1>ItemScout Rank Tracker</h1>
                <p class="subtitle">아이템스카웃 계정을 입력하여 순위 분석 데이터를 수집하고<br>CSV 파일로 다운로드합니다.</p>
            </header>

            <form id="scraperForm" onsubmit="runScraper(event)">
                <div class="form-group">
                    <label class="form-label" for="username">아이디 (이메일)</label>
                    <div class="input-wrapper">
                        <input class="form-input" type="email" id="username" name="username" placeholder="example@email.com" required>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">비밀번호</label>
                    <div class="input-wrapper">
                        <input class="form-input" type="password" id="password" name="password" placeholder="••••••••" required>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="accessKey">서버 액세스 키 (Access Key)</label>
                    <div class="input-wrapper">
                        <input class="form-input" type="password" id="accessKey" name="accessKey" placeholder="액세스 키를 입력하세요" required>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                    </div>
                </div>

                <button class="btn-submit" type="submit" id="submitBtn">
                    <div class="spinner" id="btnSpinner"></div>
                    <span id="btnText">분석 시작 및 다운로드</span>
                </button>
            </form>

            <div class="console-container" id="consoleContainer">
                <div class="console-header">
                    <div class="console-dots">
                        <div class="console-dot red"></div>
                        <div class="console-dot yellow"></div>
                        <div class="console-dot green"></div>
                    </div>
                    <div class="console-title">SCRAPER OUTPUT CONSOLE</div>
                    <div></div>
                </div>
                <div class="console-terminal" id="terminal">
                    <!-- Logs will appear here -->
                </div>
            </div>

            <div class="action-container" id="actionContainer">
                <div class="success-indicator">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                    <span>수집 및 정리가 완료되었습니다!</span>
                </div>
                <a class="btn-download" id="downloadBtn" href="#">
                    <svg viewBox="0 0 24 24">
                        <path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM17 13l-5 5-5-5h3V9h4v4h3z"/>
                    </svg>
                    <span>CSV 파일 수동 다운로드</span>
                </a>
            </div>
            
            <footer>
                Powered by molly
            </footer>
        </div>
    </div>

    <script>
        const form = document.getElementById('scraperForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        const consoleContainer = document.getElementById('consoleContainer');
        const terminal = document.getElementById('terminal');
        const actionContainer = document.getElementById('actionContainer');
        const downloadBtn = document.getElementById('downloadBtn');

        function appendLog(message, isError = false, isSuccess = false) {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            
            const time = document.createElement('span');
            time.className = 'log-time';
            const now = new Date();
            time.textContent = `[${now.toTimeString().split(' ')[0]}]`;
            
            const msg = document.createElement('span');
            msg.className = 'log-msg';
            if (isError) msg.classList.add('error');
            if (isSuccess) msg.classList.add('success');
            msg.textContent = message;
            
            entry.appendChild(time);
            entry.appendChild(msg);
            terminal.appendChild(entry);
            
            // Auto scroll to bottom
            terminal.scrollTop = terminal.scrollHeight;
        }

        async function runScraper(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const accessKey = document.getElementById('accessKey').value;

            // Reset UI
            submitBtn.disabled = true;
            btnText.textContent = "수집 진행 중...";
            btnSpinner.style.display = 'block';
            consoleContainer.style.display = 'block';
            actionContainer.style.display = 'none';
            terminal.innerHTML = '';
            
            appendLog("수집 요청을 생성하는 중...");

            try {
                // 1. Submit credentials to get a task ID
                const response = await fetch('/api/scrape', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, access_key: accessKey })
                });

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.detail || "서버 요청에 실패했습니다.");
                }

                const { task_id } = await response.json();
                appendLog(`태스크 등록 완료 (ID: ${task_id.substring(0, 8)}...). 실시간 로그 수신 시작.`);

                // 2. Open SSE connection to stream logs
                const eventSource = new EventSource(`/api/tasks/${task_id}/progress`);

                eventSource.onmessage = (event) => {
                    appendLog(event.data);
                };

                eventSource.addEventListener('complete', (event) => {
                    const data = JSON.parse(event.data);
                    appendLog("분석 완료! CSV 파일을 정리했습니다.", false, true);
                    eventSource.close();
                    
                    // Show download section
                    btnSpinner.style.display = 'none';
                    btnText.textContent = "분석 완료";
                    actionContainer.style.display = 'block';
                    
                    const downloadUrl = `/api/tasks/${task_id}/download`;
                    downloadBtn.href = downloadUrl;
                    
                    // Auto-trigger download
                    appendLog("다운로드를 자동으로 시작합니다.");
                    const link = document.createElement('a');
                    link.href = downloadUrl;
                    link.setAttribute('download', 'rankings.csv');
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                });

                eventSource.addEventListener('error', (event) => {
                    let errMsg = "수집 도중 오류가 발생했습니다.";
                    try {
                        if (event.data) {
                            const errData = JSON.parse(event.data);
                            errMsg = errData.message || errMsg;
                        }
                    } catch (e) {}
                    
                    appendLog(errMsg, true);
                    eventSource.close();
                    
                    // Reset button
                    submitBtn.disabled = false;
                    btnText.textContent = "다시 시도";
                    btnSpinner.style.display = 'none';
                });

            } catch (error) {
                appendLog(`에러 발생: ${error.message}`, true);
                submitBtn.disabled = false;
                btnText.textContent = "다시 시도";
                btnSpinner.style.display = 'none';
            }
        }
    </script>
</body>
</html>
